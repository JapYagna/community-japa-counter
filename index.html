<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Community Japa Counter — Join devotees worldwide in a sacred collective chanting initiative toward 1 Crore!" />
  <meta name="theme-color" content="#FCFAF7" />
  <title>Community Japa Counter 🙏 — Collective Chanting Initiative</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📿</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ============================================================
   🕉️ COMMUNITY JAPA COUNTER — Design System
   Reused from Divine Japa main app
   ============================================================ */
    :root {
      --font-serif: "Playfair Display", ui-serif, Georgia, serif;
      --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      --color-bg: #FCFAF7;
      --color-text: #2D2D2D;
      --color-heading: #1a1a1a;
      --color-primary: #FF9933;
      --color-primary-dark: #e07e1a;
      --color-surface1: #F5F2ED;
      --color-surface2: #EAE7E2;
      --color-danger: #dc2626;
      --color-success: #16a34a;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-serif);
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--color-primary);
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-surface2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-primary);
    }

    ::selection {
      background: rgba(255, 153, 51, 0.2);
    }

    /* Animations */
    .animate-in {
      animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmerBar {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-30px) rotate(0deg) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg) scale(0.3);
        opacity: 0;
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes countPulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }
    }

    .celebration-particle {
      position: fixed;
      top: -30px;
      font-size: 24px;
      pointer-events: none;
      z-index: 9999;
      animation: confetti-fall ease-out forwards;
    }

    /* Navbar */
    .navbar {
      padding: 28px 24px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-brand {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-heading);
      text-decoration: none;
      line-height: 1.2;
      cursor: pointer;
    }

    .nav-brand .brand-accent {
      color: var(--color-primary);
    }

    .nav-subtitle {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.5;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Main Content */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 60px;
      width: 100%;
      flex: 1;
    }

    /* Cards */
    .card {
      background: white;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-lg);
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .card-surface {
      background: var(--color-surface1);
    }

    .card-header {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      opacity: 0.55;
      margin-bottom: 20px;
    }

    .om-watermark {
      position: absolute;
      top: -20px;
      left: -10px;
      font-size: 160px;
      font-weight: 700;
      color: var(--color-primary);
      opacity: 0.04;
      user-select: none;
      pointer-events: none;
      font-style: italic;
      line-height: 1;
    }

    /* Counter */
    .counter-section {
      margin: 10px 0 20px;
    }

    .counter-value {
      font-family: var(--font-serif);
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -3px;
      color: var(--color-heading);
    }

    .counter-target {
      font-size: 1.5rem;
      opacity: 0.25;
      font-style: italic;
      margin-left: 12px;
    }

    .counter-label {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.5;
      margin-top: 8px;
    }

    /* Progress */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--color-surface2);
      position: relative;
      margin: 24px 0;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-primary);
      box-shadow: 0 2px 10px rgba(255, 153, 51, 0.3);
      position: absolute;
      top: -6px;
      transition: left 1s ease-out;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-size: 11px;
      margin-top: 8px;
    }

    .progress-pct {
      color: var(--color-primary);
      font-weight: 700;
    }

    .progress-goal {
      opacity: 0.5;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-block {
      width: 100%;
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 2px 12px rgba(255, 153, 51, 0.25);
    }

    .btn-primary:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255, 153, 51, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: white;
      color: var(--color-text);
      border: 1px solid var(--color-surface2);
    }

    .btn-outline:hover {
      background: var(--color-surface1);
      border-color: var(--color-primary);
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-text);
      opacity: 0.5;
      padding: 8px 14px;
    }

    .btn-ghost:hover {
      opacity: 1;
      color: var(--color-primary);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 10px;
    }

    .btn-lg {
      padding: 16px 32px;
      font-size: 13px;
    }

    /* Quick-add buttons grid */
    .quick-add-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .quick-btn {
      padding: 18px 8px;
      border: 2px solid var(--color-surface2);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      font-family: var(--font-sans);
    }

    .quick-btn:hover {
      border-color: var(--color-primary);
      background: #FFF7ED;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(255, 153, 51, 0.15);
    }

    .quick-btn:active {
      transform: scale(0.96);
    }

    .quick-btn .qb-num {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-heading);
      display: block;
    }

    .quick-btn .qb-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-top: 2px;
      display: block;
    }

    /* Custom input row */
    .custom-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .custom-row input {
      flex: 1;
      padding: 14px 20px;
      background: white;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 1rem;
      color: var(--color-text);
      outline: none;
      transition: var(--transition);
    }

    .custom-row input:focus {
      border-color: var(--color-primary);
    }

    .custom-row input::placeholder {
      color: #aaa;
    }

    /* Local count display */
    .local-count-card {
      background: linear-gradient(135deg, #FFF7ED 0%, #FFFBF5 100%);
      border: 2px solid var(--color-primary);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .local-count-card::before {
      content: '📿';
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 28px;
      opacity: 0.15;
    }

    .local-count-value {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      line-height: 1;
    }

    .local-count-label {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.6;
      margin-top: 6px;
    }

    /* Name input */
    .name-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .name-row input {
      flex: 1;
      padding: 10px 16px;
      background: white;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      color: var(--color-text);
      outline: none;
      transition: var(--transition);
    }

    .name-row input:focus {
      border-color: var(--color-primary);
    }

    .name-row label {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.55;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Quotes */
    .quote-card {
      background: white;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .quote-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .quote-body {
      flex: 1;
    }

    .quote-text {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.08rem;
      line-height: 1.7;
      color: var(--color-text);
    }

    .quote-deity {
      display: block;
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.45;
      margin-top: 8px;
      font-weight: 500;
    }

    .warning-card {
      background: #FFFBF0;
      border: 1px solid #F5E6CC;
    }

    .gita-quote {
      font-style: italic;
      opacity: 0.45;
      font-size: 0.92rem;
      text-align: center;
      max-width: 550px;
      margin: 0 auto 16px;
    }

    /* Recent submissions */
    .recent-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--color-surface2);
      padding: 10px 0;
      font-family: var(--font-sans);
      font-size: 0.88rem;
    }

    .recent-item:last-child {
      border-bottom: none;
    }

    .count-cell {
      font-family: var(--font-sans);
      font-weight: 700;
      background: var(--color-surface1);
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    .stat-card {
      background: var(--color-surface1);
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-heading);
    }

    .stat-label {
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 22px;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 10000;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      max-width: 380px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-success {
      background: white;
      color: var(--color-text);
      border: 1px solid var(--color-primary);
    }

    .toast-error {
      background: #fef2f2;
      color: var(--color-danger);
      border: 1px solid #fecaca;
    }

    /* Footer */
    .site-footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 30px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }

    .footer-left {
      opacity: 0.35;
    }

    /* Admin panel */
    .admin-panel {
      background: #FFF7ED;
      border: 2px dashed var(--color-primary);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-top: 24px;
    }

    .admin-panel .card-header {
      color: var(--color-primary-dark);
      opacity: 1;
    }

    .admin-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .admin-row input {
      flex: 1;
      min-width: 120px;
      padding: 10px 16px;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      outline: none;
    }

    .admin-row input:focus {
      border-color: var(--color-primary);
    }

    /* Layout */
    .home-grid {
      display: grid;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .home-grid-2col {
        grid-template-columns: 7fr 5fr;
      }
    }

    /* Empty */
    .empty-msg {
      text-align: center;
      opacity: 0.4;
      font-style: italic;
      padding: 20px;
      font-size: 0.92rem;
    }

    /* Loading skeleton shimmer */
    .loading-shimmer {
      background: linear-gradient(90deg, var(--color-surface1) 25%, var(--color-surface2) 50%, var(--color-surface1) 75%);
      background-size: 200% 100%;
      animation: shimmerBar 1.5s infinite;
      border-radius: 6px;
      display: inline-block;
    }

    .loading-text {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      opacity: 0.5;
      font-style: italic;
    }

    /* Submitting overlay — disables clicker buttons */
    .submitting .quick-btn,
    .submitting #btn-add-custom,
    .submitting #inp-custom {
      pointer-events: none;
      opacity: 0.4;
    }

    /* Admin panel enhancements */
    .admin-section {
      border-top: 1px solid rgba(255, 153, 51, 0.2);
      padding-top: 16px;
      margin-top: 16px;
    }

    .admin-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .admin-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin: 10px 0;
    }

    .admin-info-item {
      background: white;
      border: 1px solid var(--color-surface2);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }

    .admin-info-val {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-heading);
    }

    .admin-info-label {
      font-family: var(--font-sans);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 20px 16px 12px;
      }

      .nav-brand {
        font-size: 1.5rem;
      }

      .main-content {
        padding: 16px 16px 40px;
      }

      .counter-value {
        font-size: 3.2rem;
        letter-spacing: -2px;
      }

      .counter-target {
        font-size: 1.1rem;
        display: block;
        margin-left: 0;
        margin-top: 4px;
      }

      .card {
        padding: 24px 20px;
      }

      .quote-card {
        flex-direction: column;
        gap: 10px;
      }

      .stats-row {
        grid-template-columns: 1fr;
      }

      .toast {
        bottom: 16px;
        right: 16px;
        left: 16px;
        max-width: none;
      }

      .local-count-value {
        font-size: 2.2rem;
      }

      .quick-add-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
    }

    @media (max-width: 480px) {
      .counter-value {
        font-size: 2.5rem;
      }

      .quick-btn .qb-num {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // ============================================================
    // 🕉️ COMMUNITY JAPA COUNTER — GitHub Pages Edition
    // Backend: Google Form (write) + Apps Script (read)
    // ============================================================

    // ============================================================
    // ⚙️ CONFIGURATION
    // ============================================================
    const CONFIG = {
      // Google Form silent POST URL
      GOOGLE_FORM_URL: 'https://docs.google.com/forms/d/e/1FAIpQLSc5kGl-QjC3Z9OPuS_eCVniZzvKq_PsHOSk7_-Oq_fvUZmk1A/formResponse',

      // Google Form field entry IDs
      ENTRY_NAME: 'entry.2119497674',
      ENTRY_COUNT: 'entry.1493486192',
      ENTRY_TIMESTAMP: 'entry.520916889',

      // Apps Script web app URL (used for: page load, after submit, admin)
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbw0DHtxc7gEKnu-PJgBXPHFc7YmRvMtqp0YhVymM3HMaR9UJYi-P4or7IVm-hFSzJakqA/exec',

      // Google Sheets Published CSV URL (used for auto-refresh — UNLIMITED reads via Google CDN)
      // To get this: In your Google Sheet → File → Share → Publish to web → Summary sheet → CSV → Publish
      // Format: https://docs.google.com/spreadsheets/d/SHEET_ID/pub?gid=GID&single=true&output=csv
      SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ8n0czxa7nW9vTTDiKlJodGQVFgL_3yHPFx2Clw3m0Y8XomBxKSM6adNxBkgVG_qwk7l6AYuDxUy7/pub?gid=574306645&single=true&output=csv',

      // App settings
      GOAL: 10000000, // 1 Crore
      MAX_PER_SUBMIT: 100000, // 1 Lakh max per submission (anti-cheat)
      REFRESH_INTERVAL: 30000, // 30 seconds (reads from free CDN, not Apps Script)
    };

    // ============================================================
    // 📿 QUOTES DATA (reused from Divine Japa main app)

    /**

     * Reads ALL data from Summary sheet — total, override, event name, goal, participants, submissions
     * This is the ONLY data source for normal users. Zero Apps Script quota.
     */
    async function fetchTotalFromCSV() {
      try {
        const r = await fetch(CONFIG.SHEET_CSV_URL + '&t=' + Date.now());
        if (!r.ok) throw new Error('CSV fetch failed');
        const text = await r.text();
        // Parse CSV — clean \r\n line endings from Google Sheets
        const rows = text.trim().replace(/\r/g, '').split('\n').map(row => row.split(',').map(c => c.trim()));

        // Parse by labels first, then positional fallback
        let formTotal = 0, override = 0, eventName = '', goal = 0, participants = 0, totalSubmissions = 0;
        for (const row of rows) {
          const label = (row[0] || '').toLowerCase();
          const val = row[1] || '';
          if (label.includes('form total'))        formTotal = Number(val) || 0;
          if (label.includes('admin override'))     override = Number(val) || 0;
          if (label.includes('event name'))         eventName = val || '';
          if (label.includes('goal'))               goal = Number(val) || 0;
          if (label.includes('participants') || label.includes('devotees'))  participants = Number(val) || 0;
          if (label.includes('total submissions') || label.includes('entries'))  totalSubmissions = Number(val) || 0;
        }
        // Positional fallback (row index)
        if (formTotal === 0 && rows.length >= 1)      formTotal = Number(rows[0][1]) || 0;
        if (override === 0 && rows.length >= 2)        override = Number(rows[1][1]) || 0;
        if (!eventName && rows.length >= 3)            eventName = rows[2][1] || '';
        if (goal === 0 && rows.length >= 4)            goal = Number(rows[3][1]) || 0;
        if (participants === 0 && rows.length >= 5)    participants = Number(rows[4][1]) || 0;
        if (totalSubmissions === 0 && rows.length >= 6) totalSubmissions = Number(rows[5][1]) || 0;

        const total = Math.max(0, formTotal + override);

        cachedData = {
          total,
          formTotal,
          override,
          goal: goal || CONFIG.GOAL,
          eventName: eventName || 'Community Japa',
          participants,
          totalSubmissions,
          recent: cachedData?.recent || [], // recent stays from local history
        };
        return cachedData;
      } catch (e) {
        console.error('CSV fetch error:', e);
        return cachedData || { total: 0, goal: CONFIG.GOAL, recent: [], participants: 0, eventName: 'Community Japa' };
      }
    }

        </div>

        <div class="admin-section">
          <p style="font-family:var(--font-sans);font-size:0.82rem;font-weight:600;margin-bottom:4px">🗑️ Reset Override to Zero</p>
          <p style="font-family:var(--font-sans);font-size:0.78rem;opacity:0.5;margin-bottom:10px">
            Sets admin override = 0. Total becomes form-only submissions.
          </p>
          <div class="admin-row">
            <input type="password" id="inp-admin-reset-code" placeholder="Admin Secret Code" />
            <button class="btn btn-outline btn-sm" id="btn-admin-reset-override" style="color:var(--color-danger);border-color:var(--color-danger)">Reset Override</button>
          </div>
        </div>

        <div class="admin-section">
          <p style="font-family:var(--font-sans);font-size:0.82rem;font-weight:600;margin-bottom:4px">🎯 Event Configuration</p>
          <p style="font-family:var(--font-sans);font-size:0.78rem;opacity:0.5;margin-bottom:10px">
            Current event: <strong>${eventName}</strong> | Goal: <strong>${formatIndianNumber(data.goal || CONFIG.GOAL)}</strong>
          </p>
          <div class="admin-row">
            <input type="password" id="inp-admin-config-code" placeholder="Admin Secret Code" />
            <input type="text" id="inp-admin-event-name" placeholder="Event Name (e.g. Ram Jap)" value="${eventName}" />
            <input type="number" id="inp-admin-goal" placeholder="Goal" min="1" value="${data.goal || CONFIG.GOAL}" />
            <button class="btn btn-primary btn-sm" id="btn-admin-set-config">Update Config</button>
          </div>
        </div>

        <div class="admin-section">
          <p style="font-family:var(--font-sans);font-size:0.82rem;font-weight:600;margin-bottom:4px">📥 Download Data</p>
          <p style="font-family:var(--font-sans);font-size:0.78rem;opacity:0.5;margin-bottom:10px">
            Export all form submissions as CSV file.
          </p>
          <div class="admin-row">
            <input type="password" id="inp-admin-export-code" placeholder="Admin Secret Code" />
            <button class="btn btn-outline btn-sm" id="btn-admin-export">📥 Download CSV</button>
          </div>
        </div>

        <p id="admin-status" style="font-family:var(--font-sans);font-size:0.82rem;margin-top:12px;opacity:0.6"></p>
      </div>` : ''}
    </main>

    <footer class="site-footer">
      <span class="footer-left">Satyam Shivam Sundaram</span>
      <span class="footer-left">Auto-refreshes every 30s (unlimited reads via Google CDN)</span>
    </footer>
  </div>`;

      attachListeners();
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    function attachListeners() {
      const addToLocal = (n) => {
        const current = getLocalCount();
        const newVal = current + n;
        setLocalCount(newVal);
        updateLocalUI(newVal);

        // Pulse animation
        const el = document.getElementById('local-count');
        if (el) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'countPulse 0.3s ease'; }

        // Check milestones
        for (const [threshold, msg] of Object.entries(milestoneMessages)) {
          if (current < Number(threshold) && newVal >= Number(threshold)) {
            showToast(msg); triggerCelebration(); break;
          }
        }
      };

      document.getElementById('btn-108')?.addEventListener('click', () => addToLocal(108));
      document.getElementById('btn-54')?.addEventListener('click', () => addToLocal(54));
      document.getElementById('btn-27')?.addEventListener('click', () => addToLocal(27));

      document.getElementById('btn-add-custom')?.addEventListener('click', () => {
        const inp = document.getElementById('inp-custom');
        const v = parseInt(inp.value);
        if (!v || v <= 0) { showToast('Enter a valid number 🙏', 'error'); return; }
        if (v > CONFIG.MAX_PER_SUBMIT) { showToast(`Maximum ${formatIndianNumber(CONFIG.MAX_PER_SUBMIT)} per entry! 😄`, 'error'); return; }
        addToLocal(v);
        inp.value = '';
      });

      // Enter key on custom input
      document.getElementById('inp-custom')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-add-custom')?.click(); }
      });

      // Save name on change
      document.getElementById('inp-name')?.addEventListener('input', (e) => {
        setUserName(e.target.value.trim());
      });

      // Submit
      document.getElementById('btn-submit')?.addEventListener('click', async () => {
        if (isSubmitting) return; // prevent double-click
        const count = getLocalCount();
        if (count <= 0) { showToast('Add some chants first! 📿', 'error'); return; }
        if (count > CONFIG.MAX_PER_SUBMIT) { showToast(`Maximum ${formatIndianNumber(CONFIG.MAX_PER_SUBMIT)} per submission!`, 'error'); return; }

        isSubmitting = true;
        const btn = document.getElementById('btn-submit');
        const card = btn?.closest('.card');
        btn.disabled = true;
        btn.textContent = '🙏 Offering to the Divine...';
        if (card) card.classList.add('submitting'); // dims the quick-add buttons

        const name = getUserName() || 'Sadhak';
        const ok = await submitToGoogleForm(name, count);

        if (ok) {
          addSubmitHistory({ count, time: new Date().toLocaleString('en-IN'), name });
          setLocalCount(0);
          triggerCelebration();
          const q = rand(godQuotes);
          showToast(`${formatIndianNumber(count)} chants offered! ${q.emoji} — ${getDeityPrefix(q.deity)} ${q.deity} blesses you!`);

          // OPTIMISTIC UI: immediately show the updated total (no Apps Script call!)
          // The next CSV auto-refresh will sync the real number from the sheet
          if (cachedData) {
            cachedData.total = (cachedData.total || 0) + count;
          }
          isSubmitting = false;
          render();
        } else {
          isSubmitting = false;
          showToast('Submission may have failed. Try again? 🙏', 'error');
          btn.disabled = false;
          btn.textContent = `🙏 Submit My Count (${formatIndianNumber(count)})`;
          if (card) card.classList.remove('submitting');
        }
      });

      // Reset
      document.getElementById('btn-reset')?.addEventListener('click', () => {
        if (confirm('Reset your accumulated local count to 0?')) {
          setLocalCount(0);
          updateLocalUI(0);
          showToast('Local count reset! 🔄');
        }
      });

      // Admin — Set Total
      document.getElementById('btn-admin-set')?.addEventListener('click', async () => {
        const code = document.getElementById('inp-admin-code')?.value;
        const total = parseInt(document.getElementById('inp-admin-total')?.value);
        const status = document.getElementById('admin-status');
        if (!code) { showToast('Enter admin code', 'error'); return; }
        if (isNaN(total) || total < 0) { showToast('Enter valid total', 'error'); return; }
        if (status) status.textContent = '⏳ Setting total...';
        const result = await adminSetTotal(code, total);
        if (result.error) {
          if (status) status.textContent = '❌ ' + result.error;
          showToast(result.error, 'error');
        } else {
          if (status) status.textContent = '✅ Total: ' + formatIndianNumber(result.total) + ' (override: ' + formatIndianNumber(result.override) + ')';
          showToast('Total updated! 🙏');
          await fetchFullDataFromAppsScript();
          render();
        }
      });

      // Admin — Reset Override (calls dedicated endpoint)
      document.getElementById('btn-admin-reset-override')?.addEventListener('click', async () => {
        const code = document.getElementById('inp-admin-reset-code')?.value;
        const status = document.getElementById('admin-status');
        if (!code) { showToast('Enter admin code', 'error'); return; }
        if (!confirm('Reset admin override to 0? Total will become form-only submissions.')) return;
        if (status) status.textContent = '⏳ Resetting override...';
        const result = await adminResetOverride(code);
        if (result.error) {
          if (status) status.textContent = '❌ ' + result.error;
          showToast(result.error, 'error');
        } else {
          if (status) status.textContent = '✅ Override reset! Total now: ' + formatIndianNumber(result.formTotal);
          showToast('Override reset to 0! 🔄');
          await fetchFullDataFromAppsScript();
          render();
        }
      });

      // Admin — Set Config (event name + goal)
      document.getElementById('btn-admin-set-config')?.addEventListener('click', async () => {
        const code = document.getElementById('inp-admin-config-code')?.value;
        const eventName = document.getElementById('inp-admin-event-name')?.value;
        const goal = document.getElementById('inp-admin-goal')?.value;
        const status = document.getElementById('admin-status');
        if (!code) { showToast('Enter admin code', 'error'); return; }
        if (!eventName && !goal) { showToast('Enter event name or goal', 'error'); return; }
        if (status) status.textContent = '⏳ Updating config...';
        const result = await adminSetConfig(code, eventName, goal);
        if (result.error) {
          if (status) status.textContent = '❌ ' + result.error;
          showToast(result.error, 'error');
        } else {
          if (status) status.textContent = '✅ Event: ' + result.eventName + ' | Goal: ' + formatIndianNumber(result.goal);
          showToast('Config updated! Page will refresh... 🙏');
          await fetchFullDataFromAppsScript();
          render();
        }
      });

      // Admin — Download Data
      document.getElementById('btn-admin-export')?.addEventListener('click', () => {
        const code = document.getElementById('inp-admin-export-code')?.value;
        if (!code) { showToast('Enter admin code', 'error'); return; }
        const url = getExportURL(code);
        window.open(url, '_blank');
        showToast('Download started... 📥');
      });

      // Admin — Refresh Data
      document.getElementById('btn-admin-refresh')?.addEventListener('click', async () => {
        const status = document.getElementById('admin-status');
        if (status) status.textContent = '⏳ Refreshing...';
        await fetchFullDataFromAppsScript();
        render();
        showToast('Data refreshed! 🔄');
      });
    }

    function updateLocalUI(count) {
      const el = document.getElementById('local-count');
      if (el) el.textContent = formatIndianNumber(count);
      const btn = document.getElementById('btn-submit');
      if (btn) {
        btn.disabled = count === 0;
        btn.textContent = `🙏 Submit My Count (${formatIndianNumber(count)})`;
      }
      const resetBtn = document.getElementById('btn-reset');
      if (resetBtn) resetBtn.style.display = count === 0 ? 'none' : '';
    }

    // ============================================================
    // AUTO-REFRESH community data
    // ============================================================
    function updateCommunityUI(data) {
      const pct = Math.min(Math.round((data.total / data.goal) * 100), 100);
      const el = document.getElementById('total-counter');
      if (el) animateCounter(el, data.total, 800);
      const f = document.getElementById('progress-fill');
      if (f) f.style.width = pct + '%';
      const p = document.getElementById('progress-pct');
      if (p) p.textContent = pct + '%';
      const d = document.getElementById('progress-dot');
      if (d) d.style.left = `calc(${pct}% - 7px)`;
      const st = document.getElementById('stat-total');
      if (st) animateCounter(st, data.total, 800);
      const sp = document.getElementById('stat-participants');
      if (sp) sp.textContent = data.participants || 0;
      const spc = document.getElementById('stat-pct');
      if (spc) spc.textContent = pct + '%';
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      // AUTO-REFRESH uses CSV (Google CDN) — UNLIMITED reads, zero Apps Script quota
      refreshTimer = setInterval(async () => {
        const data = await fetchTotalFromCSV();
        if (data) updateCommunityUI(data);
      }, CONFIG.REFRESH_INTERVAL);
    }

    // ============================================================
    // INIT
    // ============================================================
    (async function init() {
      // Render immediately with loading shimmer (dataLoaded = false)
      render();

      // Fetch ALL data from CSV (UNLIMITED, Google CDN — zero Apps Script quota)
      const data = await fetchTotalFromCSV();
      dataLoaded = true; // removes loading shimmer on next render
      if (data) updateCommunityUI(data);

      // Re-render with real data
      render();

      // Start auto-refresh via CSV (unlimited, no quota issues)
      startAutoRefresh();
    })();
  </script>
</body>

</html>
